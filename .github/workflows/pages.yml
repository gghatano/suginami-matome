name: Deploy to GitHub Pages (test)

# GitHub Pages は「テスト環境」として develop ブランチを配信する。
# 本番環境は Cloudflare Workers（main ブランチを自動デプロイ）が担当する。

on:
  # develop へのプッシュでテスト環境を更新
  push:
    branches: [develop]
  # 手動実行も可能
  workflow_dispatch:

# 同時デプロイは1つに制限（実行中のものは完了させる）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop   # テスト用ブランチを配信
      - uses: actions/configure-pages@v5
        with:
          # Pages を「GitHub Actions」ビルドタイプで自動有効化
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - uses: actions/deploy-pages@v4
        id: deployment
