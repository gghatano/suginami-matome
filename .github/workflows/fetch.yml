name: Fetch Events

on:
  schedule:
    - cron: "0 0 * * *"   # UTC 00:00 = JST 09:00
  workflow_dispatch:        # 手動実行も可能

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install requests beautifulsoup4 feedparser lxml
      - name: Run scrapers
        run: python scrapers/fetch.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/items.json
          git diff --cached --quiet || git commit -m "chore: update events $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # fetch job のコミット後を取得
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - uses: actions/deploy-pages@v4
        id: deployment
